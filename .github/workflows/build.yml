name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write  # needed to upsert GitHub Releases

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build -c Release --no-restore

      # The Release output mirrors the bundle that ships to
      # addons/counterstrikesharp/plugins/Postmortem/: Postmortem.dll +
      # deps.json + menn-utils.dll + lang/. No CSSharp runtime DLLs (they're
      # ExcludeAssets=runtime — the server already has them).
      - name: Stage bundle
        run: |
          mkdir -p stage/Postmortem
          cp -r bin/Release/* stage/Postmortem/
          ls -la stage/Postmortem
          ls -la stage/Postmortem/lang

      - name: Zip bundle
        run: |
          cd stage
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            NAME="Postmortem-${GITHUB_REF_NAME}"
          else
            NAME="Postmortem-${GITHUB_SHA::7}"
          fi
          echo "ZIP_NAME=${NAME}" >> "$GITHUB_ENV"
          zip -r "../${NAME}.zip" Postmortem

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}.zip
          if-no-files-found: error

      # Versioned release on v* tag push.
      - name: Release (tagged)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}.zip
          generate_release_notes: true

      # Rolling "latest" release on every main push, replacing the previous
      # asset. Marked prerelease so it doesn't show as the "Latest release"
      # on the repo page unless there are no stable tags yet.
      - name: Release (rolling latest)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: latest (${{ github.sha }})
          prerelease: true
          files: ${{ env.ZIP_NAME }}.zip
          body: |
            Rolling build of `main` — replaced on every push.
            Commit: `${{ github.sha }}`
