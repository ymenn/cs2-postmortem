name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write  # needed to upsert GitHub Releases

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build -c Release --no-restore

      # The Release output mirrors the bundle that ships to
      # addons/counterstrikesharp/plugins/Postmortem/: Postmortem.dll +
      # deps.json + menn-utils.dll + lang/. No CSSharp runtime DLLs (they're
      # ExcludeAssets=runtime — the server already has them).
      - name: Stage bundle
        run: |
          mkdir -p stage/Postmortem
          cp -r bin/Release/* stage/Postmortem/
          ls -la stage/Postmortem
          ls -la stage/Postmortem/lang

      # Two zips:
      #   Postmortem.zip        — stable name for the rolling `latest`
      #                           release; softprops overwrites by filename,
      #                           so a constant name = clean replacement.
      #   Postmortem-<ver>.zip  — versioned copy for the per-build artifact
      #                           and for tagged releases, where keeping
      #                           history is the whole point.
      - name: Zip bundle
        run: |
          cd stage
          zip -r ../Postmortem.zip Postmortem
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VER="${GITHUB_REF_NAME}"
          else
            VER="${GITHUB_SHA::7}"
          fi
          cp ../Postmortem.zip "../Postmortem-${VER}.zip"
          echo "VER=${VER}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Postmortem-${{ env.VER }}
          path: Postmortem-${{ env.VER }}.zip
          if-no-files-found: error

      # Versioned release on v* tag push — keeps the version in the asset
      # name so each release tag has its own immutable Postmortem-<tag>.zip.
      - name: Release (tagged)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Postmortem-${{ env.VER }}.zip
          generate_release_notes: true

      # Rolling "latest" release on every main push. Stable filename =
      # softprops overwrites the existing asset instead of accumulating one
      # per commit. Marked prerelease so it doesn't shadow tagged releases
      # on the repo page.
      - name: Release (rolling latest)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: latest (${{ github.sha }})
          prerelease: true
          files: Postmortem.zip
          body: |
            Rolling build of `main` — replaced on every push.
            Commit: `${{ github.sha }}`
