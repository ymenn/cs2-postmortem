name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build -c Release --no-restore

      # The Release output mirrors the bundle that ships to
      # addons/counterstrikesharp/plugins/Postmortem/: Postmortem.dll +
      # deps.json + menn-utils.dll + lang/. No CSSharp runtime DLLs (they're
      # ExcludeAssets=runtime — the server already has them).
      - name: Stage bundle
        run: |
          mkdir -p stage/Postmortem
          cp -r bin/Release/* stage/Postmortem/
          ls -la stage/Postmortem

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Postmortem-${{ github.sha }}
          path: stage/Postmortem/
          if-no-files-found: error

      # Auto-zip and attach to a GitHub Release when a v* tag is pushed.
      - name: Package release zip
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd stage
          zip -r "../Postmortem-${GITHUB_REF_NAME}.zip" Postmortem

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Postmortem-*.zip
          generate_release_notes: true
